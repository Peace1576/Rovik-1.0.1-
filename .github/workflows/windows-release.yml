name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.3"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-sign-and-release:
    runs-on: windows-latest
    environment: windows-signing
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate signing configuration
        shell: pwsh
        run: |
          $required = @{
            "AZURE_CLIENT_ID" = "${{ secrets.AZURE_CLIENT_ID }}"
            "AZURE_TENANT_ID" = "${{ secrets.AZURE_TENANT_ID }}"
            "AZURE_SUBSCRIPTION_ID" = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            "AZURE_TRUSTED_SIGNING_ENDPOINT" = "${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}"
            "AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" = "${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}"
            "AZURE_TRUSTED_SIGNING_PROFILE_NAME" = "${{ vars.AZURE_TRUSTED_SIGNING_PROFILE_NAME }}"
            "NEXT_PUBLIC_SUPABASE_URL" = "${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY" = "${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            "GEMINI_API_KEY" = "${{ secrets.GEMINI_API_KEY }}"
          }

          $missing = @(
            $required.GetEnumerator() |
              Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } |
              ForEach-Object { $_.Key }
          )

          if ($missing.Count -gt 0) {
            throw "Missing required Windows signing config: $($missing -join ', '). Configure GitHub secrets/variables before publishing a public Rovik desktop release."
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Write desktop runtime env
        shell: pwsh
        run: |
          $desktopEnv = @{
            GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}"
            GOOGLE_API_KEY = "${{ secrets.GEMINI_API_KEY }}"
            NEXT_PUBLIC_SUPABASE_URL = "${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
            NEXT_PUBLIC_SUPABASE_ANON_KEY = "${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            PICOVOICE_ACCESS_KEY = "${{ secrets.PICOVOICE_ACCESS_KEY }}"
            PICOVOICE_BUILTIN_KEYWORD = "${{ vars.PICOVOICE_BUILTIN_KEYWORD }}"
            ROVIK_WAKE_BACKEND = "${{ vars.ROVIK_WAKE_BACKEND }}"
            OPENWAKEWORD_MODEL_NAME = "${{ vars.OPENWAKEWORD_MODEL_NAME }}"
            OPENWAKEWORD_THRESHOLD = "${{ vars.OPENWAKEWORD_THRESHOLD }}"
            OPENWAKEWORD_VAD_THRESHOLD = "${{ vars.OPENWAKEWORD_VAD_THRESHOLD }}"
          } | ConvertTo-Json

          Set-Content -Path "$env:GITHUB_WORKSPACE\\desktop-env.json" -Value $desktopEnv -Encoding utf8

      - name: Package desktop app payload
        run: npm run desktop:pack:app

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign packaged desktop binaries
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist-electron\Rovik-win32-x64
          files-folder-filter: "*.exe,*.dll,*.node"
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Rovik for Windows
          description-url: https://rovik-eve.vercel.app/download

      - name: Build Windows installer
        run: npm run desktop:dist:installer

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist-electron
          files-folder-filter: "Rovik-Setup-*.exe"
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Rovik for Windows
          description-url: https://rovik-eve.vercel.app/download

      - name: Resolve installer asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem "dist-electron" -Filter "Rovik-Setup-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found in dist-electron."
          }
          "ASSET_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $installer = Get-Item $env:ASSET_PATH
          $hash = Get-FileHash -Algorithm SHA256 $installer.FullName
          $checksumPath = Join-Path $installer.DirectoryName "$($installer.Name).sha256.txt"
          "$($hash.Hash.ToLower()) *$($installer.Name)" | Set-Content -Path $checksumPath -Encoding ascii
          "CHECKSUM_PATH=$checksumPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}
          generate_release_notes: true
          fail_on_unmatched_files: true
